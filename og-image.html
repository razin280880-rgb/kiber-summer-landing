<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>OG-image 1200×630 — KIBERone</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1200px; height: 630px;
  overflow: hidden;
  background: #07080F;
  color: #EEF2FF;
  font-family: 'Nunito', 'Segoe UI', sans-serif;
}
.card {
  width: 1200px; height: 630px;
  position: relative; overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 440px;
  gap: 40px;
  padding: 64px 72px;
  align-items: center;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(37,99,235,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,.08) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
}
.orb1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,.55), transparent 70%);
  top: -160px; right: -140px;
}
.orb2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(139,92,246,.45), transparent 70%);
  bottom: -120px; left: -100px;
}
.orb3 {
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(6,182,212,.4), transparent 70%);
  top: 35%; left: 40%;
}
.left  { position: relative; z-index: 1; }
.right { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; }
.logo {
  font-size: 38px; font-weight: 900; letter-spacing: -.5px;
  margin-bottom: 22px;
  display: inline-flex; align-items: center; gap: 2px;
}
.logo .o { color: #06B6D4; }
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(139,92,246,.18);
  border: 1px solid rgba(139,92,246,.45);
  border-radius: 100px; padding: 8px 18px;
  font-size: 15px; font-weight: 800; color: #C4B5FD;
  margin-bottom: 22px;
}
h1 {
  font-size: 58px; font-weight: 900; line-height: 1.05;
  margin-bottom: 20px;
  white-space: nowrap;
}
h1 .row2 { display: block; }
.grad {
  background: linear-gradient(90deg, #3B82F6, #06B6D4, #8B5CF6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sub {
  font-size: 22px; color: #C7D2FE; font-weight: 700; line-height: 1.4;
  margin-bottom: 26px; max-width: 580px;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; max-width: 580px; }
.chip {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 100px; padding: 7px 14px;
  font-size: 14px; font-weight: 800; color: #EEF2FF;
}
.chip-ai {
  background: rgba(139,92,246,.22);
  border-color: rgba(139,92,246,.5);
  color: #DDD6FE;
}
.robot {
  width: 340px; height: 340px;
  border-radius: 44px;
  background: linear-gradient(135deg, #2563EB, #8B5CF6);
  display: flex; align-items: center; justify-content: center;
  font-size: 220px; line-height: 1;
  box-shadow: 0 30px 100px rgba(37,99,235,.5);
  position: relative;
}
.robot::after {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 44px;
  background: linear-gradient(135deg, #06B6D4, #8B5CF6, transparent);
  z-index: -1;
  filter: blur(20px);
  opacity: .8;
}
.age-tag {
  background: linear-gradient(135deg, #F97316, #EF4444);
  color: #fff; font-size: 17px; font-weight: 900;
  padding: 10px 22px; border-radius: 100px;
  box-shadow: 0 10px 32px rgba(249,115,22,.45);
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="card">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="left">
    <div class="logo">KIBER<span class="o">one</span></div>
    <div class="badge">🤖 AI — главный тренд 2026</div>
    <h1>
      Летний <span class="grad">AI-лагерь</span>
      <span class="row2">для детей 8–14 лет</span>
    </h1>
    <div class="sub">За 5 дней ребёнок создаёт игру с ИИ, сайт или приложение</div>
    <div class="chips">
      <div class="chip chip-ai">🤖 AI-приложения</div>
      <div class="chip">⛏️ Minecraft</div>
      <div class="chip">🐍 Python</div>
      <div class="chip">🎮 Roblox</div>
    </div>
  </div>

  <div class="right">
    <div class="robot">🤖</div>
    <div class="age-tag">8–14 лет · 5 дней · 8 направлений</div>
  </div>
</div>

<script>
/* Сигнал для headless: шрифты загружены */
document.fonts.ready.then(() => { document.body.dataset.ready = '1'; });
</script>
</body>
</html>
